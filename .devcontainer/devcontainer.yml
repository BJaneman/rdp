name: Windows 7 Codespace

dockerComposeFile:
  - docker-compose.yml

service: win7

workspaceFolder: /workspace

forwardPorts:
  - 3389
  - 8006

portsAttributes:
  "3389":
    label: RDP
    onAutoForward: openBrowser
  "8006":
    label: Web Viewer

postCreateCommand: |
  docker ps
  echo "Codespace ready. Windows container starting..."
