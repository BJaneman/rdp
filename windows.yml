services:
  windows:
    image: dockurr/windows
    container_name: windows
    ports:
      - "8006:8006"
      - "3389:3389"
    volumes:
      - ./storage:/storage
    environment:
      VERSION: "7u"
      RAM_SIZE: "10G"
      CPU_CORES: "2"
      DISK_SIZE: "32G"
      KVM: "N"
    restart: no
