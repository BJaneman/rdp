services:
  windows:
    image: dockurr/windows
    container_name: windows
    devices:
      - /dev/kvm
    cap_add:
      - NET_ADMIN
    ports:
      - 8006:8006
      - 3389:3389
    volumes:
      - ./storage:/storage
    environment:
      VERSION: "8e"
      RAM_SIZE: "10G"
      CPU_CORES: "4"
      DISK_SIZE: "256G"
